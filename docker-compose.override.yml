# Local development overrides — hot-reload + debug logging
# This file is automatically merged by docker-compose when present.

services:
  backend:
    environment:
      - LOG_LEVEL=DEBUG
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./backend/app:/app/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload"

  frontend:
    volumes:
      - ./frontend/app:/app/app
    environment:
      - BACKEND_URL=http://backend:8000
