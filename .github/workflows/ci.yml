name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-ci.txt', 'backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          # requirements-ci.txt omits torch/transformers (both mocked in all tests)
          pip install -r requirements-dev.txt

      - name: Verify imports
        working-directory: ./backend
        env:
          NEWSDATA_API_KEY: "test_key_not_real"
          ALPHA_VANTAGE_API_KEY: "test_key_not_real"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
        run: |
          python -c "from app.main import app; print('app import OK')"
          python -m pytest tests/ --collect-only -q 2>&1 | head -20

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          NEWSDATA_API_KEY: "test_key_not_real"
          ALPHA_VANTAGE_API_KEY: "test_key_not_real"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=78

      - name: Clean up test database
        if: always()
        working-directory: ./backend
        run: rm -f test.db
