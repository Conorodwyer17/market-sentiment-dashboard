name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          # Install CPU-only torch wheel (196 MB vs 870 MB CUDA) — tests mock all ML calls
          pip install torch==2.3.0+cpu --index-url https://download.pytorch.org/whl/cpu --quiet
          # Install remaining requirements (torch already satisfied above)
          pip install -r requirements.txt --quiet
          pip install -r requirements-dev.txt --quiet

      - name: Run tests with coverage
        working-directory: ./backend
        env:
          NEWSDATA_API_KEY: "test_key_not_real"
          ALPHA_VANTAGE_API_KEY: "test_key_not_real"
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=78

      - name: Clean up test database
        working-directory: ./backend
        run: rm -f test.db
